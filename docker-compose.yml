services:
  agentbud:
    build: .
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - REDIS_URL=redis://redis:6379
      - DB_PATH=/app/data/agentbud.db
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      # Mount the local config so we can change GitOps config without rebuilding
      - ./agent-config.yaml:/app/agent-config.yaml
      # Mount local keys directory so cryptographic signatures persist between teardowns
      - ./keys:/app/keys
      # Provide a persistent volume for the local SQLite db
      - agentbud-data:/app/data
    depends_on:
      - redis
    restart: unless-stopped

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped

volumes:
  agentbud-data:
  redis-data:
